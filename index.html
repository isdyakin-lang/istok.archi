<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Зодчество Вологодчины 2026</title>
    
    <style>
        /* ПОДКЛЮЧЕНИЕ ЛОКАЛЬНЫХ ШРИФТОВ */
        @font-face {
            font-family: 'Belozersk';
            src: url('fonts/Belozersk.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Roboto';
            src: url('fonts/Roboto.ttf') format('truetype');
            font-weight: 400; /* Обычное начертание */
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Roboto';
            src: url('fonts/Roboto-Bold.ttf') format('truetype');
            font-weight: 700; /* Жирное начертание */
            font-style: normal;
            font-display: swap;
        }

        :root {
            --font-main: 'Roboto', sans-serif;
            --font-display: 'Belozersk', sans-serif;
            --color-text: #1a1a1a;
            --color-background: #ffffff;
            --color-accent: #0D47A1;
            --color-accent-hover: #1976D2;
            --color-dark-bg: #111111;
            --container-width: 1100px;
        }

        /* ОБЩИЕ СТИЛИ */
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--font-main);
            background-color: var(--color-background);
            color: var(--color-text);
            margin: 0;
            font-size: 17px;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            min-width: 320px;
        }
        .container { max-width: var(--container-width); margin: 0 auto; padding: 0 20px; }
        h2, h3 { font-family: var(--font-display); letter-spacing: 0.05em; }
        h2 { font-size: 4rem; margin: 6rem 0 2rem 0; line-height: 1.1; }
        img { max-width: 100%; height: auto; display: block; }
        a { color: var(--color-accent); text-decoration: none; transition: color 0.3s, background-color 0.3s; }
        a:hover { color: var(--color-accent-hover); }
        
        /* СТРУКТУРА ПЕРВОГО ЭКРАНА */
        .viewport-wrapper { display: flex; flex-direction: column; height: 100vh; }

        /* ГЛАВНЫЙ ЭКРАН */
        .hero {
            flex-grow: 1; display: flex; justify-content: center; align-items: center; text-align: center;
            color: white; position: relative; background-color: var(--color-dark-bg); box-sizing: border-box; padding: 20px;
        }
        .hero-background {
            position: absolute; top: 20px; left: 20px; right: 20px; bottom: 20px;
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.6)), url('images/hero-background.jpg');
            background-size: cover; background-position: center; z-index: 1;
        }
        .hero-content { position: relative; z-index: 2; width: 100%; }
        .hero h1 {
            font-family: var(--font-display);
            /* ФИНАЛЬНОЕ ИСПРАВЛЕНИЕ: Минимальный размер шрифта сильно уменьшен для гарантии */
            font-size: clamp(1.8rem, 12vw, 10rem); 
            overflow-wrap: break-word;
            word-break: break-all;
            line-height: 1; 
            margin: 0;
            letter-spacing: 0.05em; 
            text-transform: uppercase;
        }

        /* АНИМИРОВАННАЯ ПОЛОСА "ПОДАТЬ ЗАЯВКУ" */
        .cta-bar {
            display: block; background-color: var(--color-accent); color: white; text-decoration: none;
            font-family: var(--font-main); font-weight: 700;
            font-size: 2.2rem; letter-spacing: 0.1em;
            padding: 25px 0; white-space: nowrap; overflow: hidden;
            transition: background-color 0.3s ease;
        }
        .cta-bar:hover {
            background-color: var(--color-accent-hover);
            color: white;
        }
        .marquee-text { display: inline-block; padding-left: 100%; animation: marquee 30s linear infinite; }
        @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* Стили для статичной кнопки внизу */
        .cta-bar--static {
            text-align: center;
            white-space: normal;
        }

        /* БЛОК РУКОВОДИТЕЛЯ И ПАРТНЕРОВ */
        .organizer-section { background-color: #f4f4f4; padding: 4rem 0; }
        .organizer-grid { display: grid; grid-template-columns: 300px 1.5fr 1fr; gap: 3rem; align-items: flex-start; }
        .organizer-photo { width: 100%; object-fit: cover; aspect-ratio: 1/1.2; border-radius: 4px; }
        .organizer-info h3 { font-size: 2rem; margin:0; }
        .organizer-info p { color: #555; margin-top: 0.5rem; font-size: 16px; }
        .organizer-info p:first-of-type { margin-top: 1.5rem; }
        
        .partners-list h4 {
            font-family: var(--font-main);
            font-weight: 700; text-transform: uppercase; font-size: 1rem;
            letter-spacing: 0.1em; color: #999; margin: 0 0 1rem 0;
        }
        .partner-item { display: flex; align-items: center; margin-bottom: 1rem; }
        .partner-item img {
            height: 36px; width: 36px; object-fit: contain; margin-right: 15px; flex-shrink: 0;
        }
        .partner-item a { color: var(--color-text); font-size: 1.1rem; font-weight: 700; }
        .partner-item a:hover { color: var(--color-accent); }

        /* БЛОК ЭТАПОВ */
        .stages-grid { margin-top: 3rem; display: grid; gap: 1.5rem; }
        .stage-item {
            display: grid; grid-template-columns: 250px 1fr; align-items: start;
            padding-bottom: 1.5rem; border-bottom: 1px solid #eee;
        }
        .stage-item:last-child { border-bottom: none; }
        .stage-date { font-family: var(--font-display); font-size: 1.8rem; letter-spacing: 0.05em; color: var(--color-accent); }
        .stage-description { font-size: 1.1rem; font-weight: 700; }
        .stage-description small { display: block; font-weight: 400; color: #777; font-size: 0.9em; margin-top: 0.5rem; }

        /* ПОЛОСКА С УСЛОВИЯМИ */
        .conditions-strip { background-color: #f4f4f4; text-align: center; padding: 2rem 0; margin-top: 4rem; }
        .conditions-strip p { margin: 0; font-weight: 700; }
        .conditions-strip span { display: inline-block; border: 2px solid var(--color-accent); padding: 0.3rem 1rem; margin: 0 0.5rem; }

        /* БЛОК "ЗАДАЧИ КОМАНД" */
        .tasks-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; }
        .task-card { border: 2px solid var(--color-accent); padding: 2rem; border-radius: 4px; }
        .task-card h3 { font-size: 2rem; margin: 0 0 1rem 0; color: var(--color-accent); }
        .task-card p { margin: 0; }

        /* БЛОК "КОГО МЫ ИЩЕМ" */
        .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; margin-top: 3rem; }
        .team-role { padding: 1.5rem; border-left: 4px solid var(--color-accent); background-color: #f9f9f9; }
        .team-role h4 { font-size: 1.2rem; font-weight: 700; margin: 0 0 0.5rem 0; }
        .team-role p { margin: 0; color: #666; }
        
        /* БЛОК "ИТОГИ ЭКСПЕДИЦИИ" */
        .outcomes-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1.5rem 2.5rem; list-style: none; padding: 0; margin-top: 3rem;
        }
        .outcomes-grid li { font-weight: 700; padding-left: 30px; position: relative; }
        .outcomes-grid li::before {
            content: '✓'; position: absolute; left: 0; top: -2px; font-size: 1.2em;
            color: var(--color-accent); font-weight: 900;
        }

        /* БЛОК "КАК ЭТО БЫЛО" И КАРУСЕЛЬ */
        .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: center; }
        .results-list { list-style-type: '✓ '; padding-left: 20px; margin: 0;}
        .results-list li { margin-bottom: 1rem; font-size: 1.1rem; font-weight: 700; }
        .results-list li:last-child { margin-bottom: 0; }
        
        .carousel { position: relative; overflow: hidden; border-radius: 4px; }
        .carousel-track {
